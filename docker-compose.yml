version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: esai
      POSTGRES_USER: esai
      POSTGRES_PASSWORD: esai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"

  influxdb:
    image: influxdb:2-alpine
    environment:
      INFLUXDB_DB: esai
    ports:
      - "8086:8086"

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://esai:esai_password@postgres:5432/esai
      REDIS_URL: redis://redis:6379/0
      MQTT_BROKER: mosquitto
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mosquitto
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  redis_data: